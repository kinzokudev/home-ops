---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: victoria-logs-single
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    server:
      enabled: true
      # fullnameOverride: *app
      mode: deployment
      image:
        repository: docker.io/victoriametrics/victoria-logs
        tag: v1.23.2-victorialogs@sha256:a6d232dcd02d1194fe3617f6e86296e0031fcafe9b6eb41570dc70f307fc86a9
        pullPolicy: IfNotPresent
      retentionPeriod: 1  # months
      persistentVolume:
        enabled: true
        storageClassName: openebs-hostpath
        size: 15Gi
        subPath: data
      ingress:
        enabled: true
        ingressClassName: internal
        pathType: Prefix
        hosts:
          - name: &host vmlogs.kinzoku.dev
            path: /
            port: http
        tls:
          - hosts: [*host]
      resources:
        requests:
          cpu: 50m
      securityContext:
        enabled: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: {drop: [ALL]}
      podSecurityContext:
        enabled: true
        runAsNonRoot: true
        runAsUser: &uid 1000
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        seccompProfile: {type: RuntimeDefault}
      serviceMonitor:
        enabled: true
    fluent-bit:
      enabled: false  # TODO: explore this
    extraObjects: []
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: '1'
