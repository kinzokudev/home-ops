---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tofu-controller
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.10.1@sha256:c947183050322022b1125783c0d8224b5535c37fab6cd89ba8ab88d8ad9e2ed6
    resources:
      limits:
        cpu: ~
        memory: ~
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 1m
